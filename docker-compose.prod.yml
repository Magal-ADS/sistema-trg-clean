name: trg-clean-prod

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: trg_clean_app_prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: db
      DB_PORT: 5432
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    volumes:
      - app_storage:/var/www/html/storage
      - app_public:/var/www/html/public
      # Temporario: disponibiliza o CSV de variacoes versionado para o import.
      - ./storage/app/glide_backups:/var/www/html/storage/app/glide_backups:ro
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "mkdir -p storage/app/public storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs bootstrap/cache
      && cp -a /var/www/html/public_temp/. /var/www/html/public/
      && php artisan storage:link --force
      && php artisan migrate --force
      && php artisan optimize
      && chown -R www-data:www-data storage bootstrap/cache public
      && php-fpm"
    networks:
      - trg_clean_prod

  nginx:
    image: nginx:1.27-alpine
    container_name: trg_clean_nginx_prod
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8004}:80"
    volumes:
      - app_public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - trg_clean_prod

  db:
    image: postgres:16-alpine
    container_name: trg_clean_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:${DB_FORWARD_PORT:-54320}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - trg_clean_prod

volumes:
  postgres_data:
  app_public:
  app_storage:

networks:
  trg_clean_prod:
    driver: bridge
