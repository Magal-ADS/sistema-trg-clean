services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trg_clean_app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    depends_on:
      - postgres
    networks:
      - trg_clean

  nginx:
    image: nginx:1.27-alpine
    container_name: trg_clean_nginx
    ports:
      - "8004:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - trg_clean

  postgres:
    image: postgres:16-alpine
    container_name: trg_clean_postgres
    environment:
      POSTGRES_DB: trg_clean
      POSTGRES_USER: trg_clean
      POSTGRES_PASSWORD: secret
    ports:
      - "54320:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trg_clean

volumes:
  postgres_data:
  vendor_data:

networks:
  trg_clean:
    driver: bridge
